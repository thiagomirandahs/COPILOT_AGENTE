# Continue (VSCode) + Ollama — copiloto Adir rodando 100% local e gratis.
# Setup completo: ../SETUP-OLLAMA.md
name: Adir
version: 1.0.0
schema: v1

models:
  # 💬 Principal — chat / edit / agent. Troque o tamanho conforme seu hardware.
  - name: Adir
    provider: ollama
    model: adir
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.2
      contextLength: 8192
      maxTokens: 4096

  # ⚡ Autocomplete — modelo pequeno e rapido (FIM, variante "-base").
  - name: Adir Autocomplete
    provider: ollama
    model: qwen2.5-coder:1.5b-base
    roles:
      - autocomplete

  # 🔎 Embeddings — habilita busca no @codebase (opcional).
  - name: Adir Embeddings
    provider: ollama
    model: nomic-embed-text
    roles:
      - embed

# 🧬 Identidade + stack da Adir SEMPRE ativas (fonte unica = prompt-base.md).
# Caminho relativo a raiz do workspace (a pasta DIO aberta no VSCode).
rules:
  - file://prompts/prompt-base.md

# 🎛️ Modos da Adir como comandos de barra no chat: /ask /edit /plan /agent /study
prompts:
  - name: ask
    description: Adir modo Ask (so leitura — explica, nao edita)
    prompt: >-
      Aja no MODO ASK (somente leitura): explique, diagnostique e sugira — NAO
      edite arquivos nem rode comandos. Resuma em 1-3 linhas, de o porque, como
      confirmar e 2-3 opcoes; ofereca patch, nao gere sozinha.
      Spec completa: prompts/prompt-ask.md
  - name: edit
    description: Adir modo Edit (mudanca cirurgica em codigo existente)
    prompt: >-
      Aja no MODO EDIT: altere so o que foi pedido e preserve o resto. Mostre
      diff ou bloco "Arquivo:". Destaque breaking changes. Nada de dependencia
      nova escondida.
      Spec completa: prompts/prompt-edit.md
  - name: plan
    description: Adir modo Plan (planeja, nao implementa)
    prompt: >-
      Aja no MODO PLAN: entregue um plano revisavel (objetivo, escopo,
      estrategia, arquivos afetados, passos, testes, riscos). NAO implemente,
      sem codigo completo.
      Spec completa: prompts/prompt-plan.md
  - name: agent
    description: Adir modo Agent (implementacao completa)
    prompt: >-
      Aja no MODO AGENT: ciclo Descobrir → Planejar → Implementar → Verificar →
      Finalizar. Entregue codigo pronto, com testes e como validar. Assuma e
      declare quando faltar detalhe.
      Spec completa: prompts/prompt-agent.md
  - name: study
    description: Adir modo Study (tutora didatica)
    prompt: >-
      Aja no MODO STUDY: ensine com progressao (conceito, analogia, exemplo
      minimo, armadilhas, quando usar/evitar) e faca checkpoints de compreensao.
      Spec completa: prompts/prompt-study.md

# 📎 Contextos disponiveis no chat.
context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: codebase
  - provider: terminal
