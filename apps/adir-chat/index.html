<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Adir — seu copiloto local</title>
<style>
  :root{--bg:#0f1117;--panel:#171a23;--u:#2b6cb0;--a:#222634;--text:#e6e8ee;--muted:#8b90a0;--accent:#5b9dff;--border:#272b38;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;}
  header{padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .logo{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#5b9dff,#9b6bff);display:flex;align-items:center;justify-content:center;font-weight:700;}
  h1{font-size:16px;margin:0;}
  .sub{font-size:12px;color:var(--muted);}
  select{margin-left:auto;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;}
  #chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
  .msg{max-width:760px;padding:12px 16px;border-radius:14px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;}
  .msg.user{align-self:flex-end;background:var(--u);}
  .msg.adir{align-self:flex-start;background:var(--a);border:1px solid var(--border);}
  .who{font-size:11px;color:var(--muted);margin-bottom:4px;}
  .empty{color:var(--muted);text-align:center;margin:auto;}
  form{display:flex;gap:10px;padding:16px 20px;background:var(--panel);border-top:1px solid var(--border);}
  #input{flex:1;resize:none;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-family:inherit;max-height:160px;}
  button{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0 20px;font-weight:600;cursor:pointer;}
  button:disabled{opacity:.5;cursor:default;}
</style>
</head>
<body>
  <header>
    <div class="logo">A</div>
    <div><h1>Adir</h1><div class="sub">copiloto local · sem créditos</div></div>
    <select id="model" title="Modelo"></select>
  </header>
  <div id="chat"><div class="empty">Olá Thiago 👋 — pergunte algo pra Adir.</div></div>
  <form id="form">
    <textarea id="input" rows="1" placeholder="Escreva e Enter  (Shift+Enter = nova linha)…" autofocus></textarea>
    <button id="send" type="submit">Enviar</button>
  </form>
<script>
const chat=document.getElementById("chat"),form=document.getElementById("form"),
  input=document.getElementById("input"),sendBtn=document.getElementById("send"),
  modelSel=document.getElementById("model"),history=[];

fetch("/api/tags").then(r=>r.json()).then(d=>{
  let models=(d.models||[]).map(m=>m.name).filter(n=>n.startsWith("adir"));
  if(!models.length)models=["adir"];
  models.sort((a,b)=>(b.includes("rapida")?1:0)-(a.includes("rapida")?1:0));
  modelSel.innerHTML=models.map(n=>`<option value="${n}">${n}</option>`).join("");
}).catch(()=>{modelSel.innerHTML='<option value="adir">adir</option>';});

input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();form.requestSubmit();}});
input.addEventListener("input",()=>{input.style.height="auto";input.style.height=Math.min(input.scrollHeight,160)+"px";});

function addMsg(who,cls,text){
  const empty=chat.querySelector(".empty");if(empty)empty.remove();
  const el=document.createElement("div");el.className="msg "+cls;
  el.innerHTML='<div class="who"></div><span class="body"></span>';
  el.querySelector(".who").textContent=who;el.querySelector(".body").textContent=text;
  chat.appendChild(el);chat.scrollTop=chat.scrollHeight;return el.querySelector(".body");
}

form.addEventListener("submit",async e=>{
  e.preventDefault();
  const text=input.value.trim();if(!text)return;
  input.value="";input.style.height="auto";sendBtn.disabled=true;
  addMsg("Você","user",text);history.push({role:"user",content:text});
  const out=addMsg("Adir","adir","…");
  try{
    const resp=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:modelSel.value,messages:history,stream:true})});
    const reader=resp.body.getReader(),dec=new TextDecoder();let acc="",buf="";out.textContent="";
    while(true){
      const{value,done}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const lines=buf.split("\n");buf=lines.pop();
      for(const line of lines){if(!line.trim())continue;
        try{const j=JSON.parse(line);acc+=(j.message?.content||"");out.textContent=acc;chat.scrollTop=chat.scrollHeight;}catch{}}
    }
    history.push({role:"assistant",content:acc});
  }catch(err){out.textContent="⚠️ Erro: "+err.message+" — o Ollama está rodando?";}
  finally{sendBtn.disabled=false;input.focus();}
});
</script>
</body>
</html>
